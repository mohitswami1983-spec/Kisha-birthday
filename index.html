<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Kisha ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { text-align: center; font-family: 'Arial', sans-serif; background: #fff0f5; padding: 20px; }
        .gift-box { display: none; margin-top: 20px; }
        .photo { width: 90%; max-width: 400px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); margin-bottom: 15px; }
        .letter-box { background: white; padding: 25px; border-radius: 15px; border: 2px dashed #ff69b4; width: 85%; margin: 20px auto; display: none; text-align: center; }
        button { padding: 12px 25px; background: #ff69b4; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

    <h1 id="title">Happy Birthday Kisha ❤️🎂</h1>
    <button id="startBtn" onclick="showNext()">🎁 Open Your Gifts</button>

    <!-- 10 Steps for 10 Photos -->
    <div id="step1" class="gift-box"><img src="4953.png" class="photo"><br><button onclick="showNext()">Next ➡️</button></div>
    <div id="step2" class="gift-box"><img src="4954.png" class="photo"><br><button onclick="showNext()">Next ➡️</button></div>
    <div id="step3" class="gift-box"><img src="4955.png" class="photo"><br><button onclick="showNext()">Next ➡️</button></div>
    <div id="step4" class="gift-box"><img src="4956.png" class="photo"><br><button onclick="showNext()">Next ➡️</button></div>
    <div id="step5" class="gift-box"><img src="4957.png" class="photo"><br><button onclick="showNext()">Next ➡️</button></div>
    <div id="step6" class="gift-box"><img src="4958.png" class="photo"><br><button onclick="showNext()">Next ➡️</button></div>
    <div id="step7" class="gift-box"><img src="4959.png" class="photo"><br><button onclick="showNext()">Next ➡️</button></div>
    <div id="step8" class="gift-box"><img src="4960.png" class="photo"><br><button onclick="showNext()">Next ➡️</button></div>
    <!-- Add more steps here if you have more photos -->

    <!-- Final Letter -->
    <div id="letter" class="letter-box">
        <h2>💌 A Special Note for Kisha</h2>
        <p>Yahan tera poora long birthday letter aayega jo tumne socha hai... <br><br> Happy Birthday Kisha! ❤️</p>
    </div>

    <script>
        let currentStep = 0;
        function showNext() {
            // Party Popper
            confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
            
            // Hide previous
            if(currentStep > 0) document.getElementById('step'+currentStep).style.display = 'none';
            document.getElementById('startBtn').style.display = 'none';
            
            currentStep++;
            
            // Show next or Letter
            if(document.getElementById('step'+currentStep)) {
                document.getElementById('step'+currentStep).style.display = 'block';
            } else {
                document.getElementById('letter').style.display = 'block';
            }
        }
    </script>
</body>
</html>
